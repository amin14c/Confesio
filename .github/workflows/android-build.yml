name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # يسمح بتشغيل البناء يدوياً من واجهة GitHub

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build Web App (React/Vite)
        env:
          # يجب إضافة هذا المتغير في إعدادات GitHub Secrets
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Sync Capacitor (Copy web assets to Android)
        run: npm run sync

      - name: Grant execute permission for gradlew
        working-directory: ./android
        run: chmod +x gradlew

      - name: Fix Corrupt Gradle Wrapper
        working-directory: ./android
        run: gradle wrapper

      - name: Build Android APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: confessio-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
